name: Update AniList Heatmap

on:
  schedule:
    # Runs at 00:00 UTC every Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Heatmap
        env:
          ANILIST_USERNAME: ${{ secrets.ANILIST_USERNAME }}
        run: python generate_heatmap.py

      - name: Commit and Push if Changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add anilist_heatmap.svg
          git diff --cached --quiet || git commit -m "Update weekly AniList heatmap"
          git push
